name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      live_url:
        description: "Live NEXO Ride URL"
        required: true
        default: "https://ride.nexoofficial.in/app/?v=1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Android
        run: |
          cp android_build_prep/package.android-wrapper.json package.json
          cp android_build_prep/capacitor.config.ts capacitor.config.ts
          npm install
          npx cap sync android
          find . -name "*.gradle" -type f -exec sed -i 's/VERSION_21/VERSION_17/g; s/sourceCompatibility JavaVersion.VERSION_21/sourceCompatibility JavaVersion.VERSION_17/g; s/targetCompatibility JavaVersion.VERSION_21/targetCompatibility JavaVersion.VERSION_17/g' {} \;

      - name: Build Debug APK
        run: |
          cd android_build_prep/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEXO-Ride-Debug-APK
          path: android_build_prep/android/app/build/outputs/apk/debug/*.apk
