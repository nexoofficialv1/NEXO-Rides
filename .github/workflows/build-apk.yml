name: Build NEXO Ride APK 7A

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build APK Sprint-7A

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager --list_installed | grep -E "platforms;android-34|build-tools;34.0.0|platform-tools" || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Verify project
        working-directory: apk
        run: |
          java -version
          gradle --version
          ls -la
          cat build.gradle
          cat app/build.gradle

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        working-directory: apk
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Build Release APK unsigned
        if: inputs.build_type == 'release'
        working-directory: apk
        run: gradle :app:assembleRelease --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXO_Ride_APK_Sprint7A_${{ inputs.build_type }}
          path: |
            apk/app/build/outputs/apk/debug/*.apk
            apk/app/build/outputs/apk/release/*.apk
          retention-days: 30
