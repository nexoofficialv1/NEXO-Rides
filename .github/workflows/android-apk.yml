name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      live_url:
        description: "Live NEXO Ride URL"
        required: true
        default: "https://ride.nexoofficial.in/app/?v=1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check versions
        run: |
          java -version
          javac -version
          node -v

      - name: Prepare Android
        run: |
          cp android_build_prep/package.android-wrapper.json package.json
          cp android_build_prep/capacitor.config.ts capacitor.config.ts
          npm install
          npx cap add android || true
          npx cap sync android

      - name: Build Debug APK
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version
          cd android_build_prep/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEXO-Ride-Debug-APK
          path: android_build_prep/android/app/build/outputs/apk/debug/*.apk
